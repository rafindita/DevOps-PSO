name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Provision & Deploy to Azure Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            echo "=== FASE 1: AUDIT & PROVISI INFRASTRUKTUR ==="
            sudo apt-get update -y
            sudo apt-get install -y unzip curl
            
            if [ ! -d "$HOME/.bun" ]; then
              echo "Menginisiasi instalasi Bun runtime..."
              curl -fsSL https://bun.sh/install | bash
            fi
            
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            
            echo "=== FASE 2: SINKRONISASI KODE SUMBER ==="
            PROJECT_DIR="/home/${{ secrets.AZURE_VM_USERNAME }}/DevOps-PSO"
            
            if [ ! -d "$PROJECT_DIR" ]; then
              git clone https://github.com/rafindita/DevOps-PSO.git $PROJECT_DIR
            fi
            
            cd $PROJECT_DIR
            git config --global --add safe.directory $PROJECT_DIR
            git pull origin main
            
            echo "=== FASE 3: KONFIGURASI ENVIRONMENT & DATABASE ==="
            # Menyuntikkan kredensial database default agar Drizzle ORM dapat terhubung
            # Asumsi: Docker compose menjalankan Postgres di port 5432 dengan auth default
            echo 'DATABASE_URL="postgresql://postgres:postgres@127.0.0.1:5432/postgres"' > packages/db/.env
            echo 'DATABASE_URL="postgresql://postgres:postgres@127.0.0.1:5432/postgres"' > apps/server/.env
            
            bun install
            
            echo "Memastikan Docker Database beroperasi..."
            # Mempertahankan Environment PATH agar sudo mengenali perintah 'bun'
            sudo -E env PATH=$PATH bun run db:start || true
            sleep 15
            
            echo "Menerapkan migrasi database..."
            bun run db:push
            
            echo "Mem-build aplikasi Web dan API..."
            bun run build
            
            echo "=== FASE 4: ORKESTRASI LAYANAN (ZERO DOWNTIME) ==="
            echo "Menghentikan instans layanan lama..."
            pkill -f "dev:server" || true
            pkill -f "dev:web" || true
            
            echo "Menjalankan versi terbaru di background..."
            # Pelepasan aliran I/O absolut untuk mencegah anomali Signal 143
            nohup bun run dev:server > api_server.log 2>&1 < /dev/null &
            nohup bun run dev:web > web_client.log 2>&1 < /dev/null &
            
            echo "Deployment Tereksekusi dengan Sukses. Mengamankan Terminasi Sesi..."
            exit 0
